[build]
functions = "netlify/functions"

[[redirects]]
from = "/v1/*"
to = "/.netlify/functions/openai/v1/:splat"
status = 200
force = true

[[redirects]]
from = "/health"
to = "/.netlify/functions/openai/health"
status = 200
force = true

[[redirects]]
from = "/"
to = "/.netlify/functions/openai/"
status = 200
force = true
